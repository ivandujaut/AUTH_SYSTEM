services:
  db:
    image: postgres:16-alpine
    container_name: volsmart_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - volsmart-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$DB_USER']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: volsmart_api
    working_dir: /app
    command: npm run start:dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - volsmart-net

volumes:
  pgdata:

networks:
  volsmart-net:
    driver: bridge
