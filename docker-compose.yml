services:
  db:
    image: postgres:16-alpine
    container_name: volsmart_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: volsmart
      POSTGRES_PASSWORD: volsmart
      POSTGRES_DB: volsmart_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

networks:
  volsmart-net:
