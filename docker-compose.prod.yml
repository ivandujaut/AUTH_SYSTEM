services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volsmart_api
    restart: unless-stopped
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - volsmart-net
    user: "1000:1000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}

  db:
    image: postgres:16-alpine
    container_name: volsmart_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - volsmart-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:

networks:
  volsmart-net:
    driver: bridge
