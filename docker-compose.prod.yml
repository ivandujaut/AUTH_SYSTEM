services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volsmart_api
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: 'postgresql://volsmart:volsmart@db:5432/volsmart_db'
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: volsmart_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: volsmart
      POSTGRES_PASSWORD: volsmart
      POSTGRES_DB: volsmart_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - volsmart-net

volumes:
  pgdata:

networks:
  volsmart-net:
    driver: bridge
